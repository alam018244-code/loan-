<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Repayment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="card">

        <div class="status-box">
            <h3>overdue</h3>
            <div class="amount">₹ 6960</div>
            <div class="label">Repayment amount</div>
        </div>

        <div class="details">
            <div class="row">
                <span>Period</span>
                <span>7 days</span>
            </div>

            <div class="row">
                <span>Loan status</span>
                <span class="red">overdue</span>
            </div>

            <div class="row">
                <span>Name:</span>
                <span>FinCure</span>
            </div>

            <div class="row">
                <span>Mobile:</span>
                <span>919831353349</span>
            </div>
        </div>

        <button class="btn" onclick="goToRepay()">Go To Channel</button>
        <button class="btn light">Upload Payment Voucher</button>

        <div class="notice">
            <h4>Customer Notice:</h4>
            <p>
                The company stipulates that staff can only notify repayment one day in advance and should not disturb your life at other times.
            </p>
        </div>

    </div>
</div>

<script>
function goToRepay() {
    window.location.href = "repay.html";
}
</script>

</body>
</html>
