<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Page</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.main-box {
  width: 100%;
  max-width: 420px;
  background: #ffffff;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #e0e0e0;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
  font-size: 18px;
  color: #333;
}

.timer {
  text-align: center;
  color: #d9534f;
  font-size: 14px;
  margin-bottom: 15px;
}

.instructions {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  padding: 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 15px;
  color: #444;
}

.instructions ol {
  margin: 0;
  padding-left: 18px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 14px;
}

.payment-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 14px;
}

.payment-row button {
  padding: 5px 10px;
  font-size: 12px;
  border: none;
  border-radius: 4px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.payment-row button:hover {
  background: #1e40af;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 14px;
}

.submit-btn {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.submit-btn:hover {
  background: #1e40af;
}

#msg {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #333;
}
</style>
</head>

<body>

<div class="main-box">

  <h2>Complete Payment</h2>

  <div class="timer" id="timer">09:00</div>

  <div class="instructions">
    <ol>
      <li>Click Copy to copy UPI ID</li>
      <li>Pay using your UPI app</li>
      <li>Enter 12-digit UTR</li>
      <li>Submit after payment</li>
    </ol>
  </div>

  <div class="info-row">
    <span>Product</span>
    <span>Tivo</span>
  </div>

  <div class="info-row">
    <span>Amount</span>
    <span>2999</span>
  </div>

  <h2>UPI ID</h2>

  <div class="payment-row">
    <span id="upiText">avinashsakpal0518-2@okicici</span>
    <button onclick="copyUPI()">Copy</button>
  </div>

  <input type="text" id="utr" placeholder="Enter 12-digit UTR">
  <button class="submit-btn" onclick="submitUTR()">Submit</button>

  <p id="msg"></p>

</div>

<script>

function copyUPI(){
  let text = document.getElementById("upiText").innerText;
  navigator.clipboard.writeText(text);
  showMsg("UPI copied successfully");
}

function showMsg(message){
  let el = document.getElementById("msg");
  el.innerText = message;
  setTimeout(() => el.innerText = "", 3000);
}

function submitUTR(){
  let utr = document.getElementById("utr").value.trim();
  if(/^\d{12}$/.test(utr)){
    showMsg("Payment updating...");
  } else {
    showMsg("Invalid UTR number");
  }
}

let time = 540;
let timerElement = document.getElementById("timer");

let countdown = setInterval(() => {
  let minutes = Math.floor(time / 60);
  let seconds = time % 60;

  timerElement.innerText = `${minutes}:${seconds.toString().padStart(2,'0')}`;
  time--;

  if(time < 0){
    clearInterval(countdown);
    timerElement.innerText = "Expired";
    alert("Payment expired!");
  }

}, 1000);

</script>

</body>
</html>
